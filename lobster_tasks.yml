name: Lobster Daily Tasks
on:
  schedule:
    - cron: '30 0 * * *' # 每天台灣時間早上 8:30 (UTC+8)
  workflow_dispatch: # 允許你手動在 GitHub App 隨時按按鈕喚醒它

jobs:
  run-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests pandas yfinance # yfinance 可幫你下載股市資料
      - name: Run Lobster
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/lobster_core.py
